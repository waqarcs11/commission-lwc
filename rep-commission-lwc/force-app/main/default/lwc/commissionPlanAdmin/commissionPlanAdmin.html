<template>
    <lightning-card title="Commission Plan Field Configuration" icon-name="standard:settings">
        <div class="slds-p-around_medium">

            <!-- Plan selector -->
            <lightning-combobox
                name="plan"
                label="Select Commission Plan"
                placeholder="-- Select a Plan --"
                value={selectedPlan}
                options={planOptions}
                onchange={handlePlanChange}
                class="slds-m-bottom_medium"
            ></lightning-combobox>

            <!-- Loading spinner -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>

            <!-- Field checkboxes (shown once a plan is selected and not loading) -->
            <template if:true={showFields}>

                <!-- Data Entry Fields -->
                <div class="slds-box slds-m-bottom_medium">
                    <p class="slds-text-heading_small slds-m-bottom_small">Representative Commission Data Entry Fields</p>
                    <template for:each={dataEntryFields} for:item="field">
                        <div key={field.apiName} class="field-row">
                            <div class="field-label">
                                <lightning-input
                                    type="checkbox"
                                    label={field.label}
                                    checked={field.checked}
                                    data-api={field.apiName}
                                    onchange={handleFieldToggle}
                                ></lightning-input>
                            </div>
                            <div class="move-buttons">
                                <lightning-button-icon
                                    icon-name="utility:up"
                                    variant="border-filled"
                                    size="x-small"
                                    alternative-text="Move Up"
                                    data-api={field.apiName}
                                    onclick={handleMoveUp}
                                ></lightning-button-icon>
                                <lightning-button-icon
                                    icon-name="utility:down"
                                    variant="border-filled"
                                    size="x-small"
                                    alternative-text="Move Down"
                                    data-api={field.apiName}
                                    onclick={handleMoveDown}
                                ></lightning-button-icon>
                            </div>
                        </div>
                    </template>
                </div>

                <!-- Calculation Output Fields -->
                <div class="slds-box slds-m-bottom_medium">
                    <p class="slds-text-heading_small slds-m-bottom_small">Representative Commission Calculation Fields</p>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                        Select which calculated results to display on the record detail page.
                    </p>
                    <template for:each={calcFields} for:item="field">
                        <div key={field.apiName} class="field-row">
                            <div class="field-label">
                                <lightning-input
                                    type="checkbox"
                                    label={field.label}
                                    checked={field.checked}
                                    data-api={field.apiName}
                                    onchange={handleFieldToggle}
                                ></lightning-input>
                            </div>
                            <div class="move-buttons">
                                <lightning-button-icon
                                    icon-name="utility:up"
                                    variant="border-filled"
                                    size="x-small"
                                    alternative-text="Move Up"
                                    data-api={field.apiName}
                                    onclick={handleMoveUp}
                                ></lightning-button-icon>
                                <lightning-button-icon
                                    icon-name="utility:down"
                                    variant="border-filled"
                                    size="x-small"
                                    alternative-text="Move Down"
                                    data-api={field.apiName}
                                    onclick={handleMoveDown}
                                ></lightning-button-icon>
                            </div>
                        </div>
                    </template>
                </div>

                <lightning-button
                    variant="brand"
                    label="Save Configuration"
                    onclick={handleSave}
                    disabled={isSaving}
                ></lightning-button>
            </template>

            <!-- Empty state when no fields returned -->
            <template if:true={showEmpty}>
                <p class="slds-text-color_weak">No accessible fields found on Representative Commission.</p>
            </template>

        </div>
    </lightning-card>
</template>
