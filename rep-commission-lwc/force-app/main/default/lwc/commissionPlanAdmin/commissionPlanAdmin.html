<template>
    <lightning-card title="Commission Plan Field Configuration" icon-name="standard:settings">
        <div class="slds-p-around_medium">

            <!-- Plan selector -->
            <lightning-combobox
                name="plan"
                label="Select Commission Plan"
                placeholder="-- Select a Plan --"
                value={selectedPlan}
                options={planOptions}
                onchange={handlePlanChange}
                class="slds-m-bottom_medium"
            ></lightning-combobox>

            <!-- Loading spinner -->
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </template>

            <template if:true={showFields}>

                <!-- Report Sources Reference Widget -->
                <template if:true={hasReportSources}>
                    <div class="slds-box slds-m-bottom_medium report-sources-widget">
                        <p class="slds-text-heading_small slds-m-bottom_x-small">Report Sources Reference</p>
                        <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                            The fields below pull their default values from Salesforce reports. Click a report name to open it.
                        </p>
                        <table class="slds-table slds-table_cell-buffer slds-table_bordered slds-table_col-bordered report-sources-table">
                            <thead>
                                <tr class="slds-line-height_reset">
                                    <th scope="col"><div class="slds-truncate">Field</div></th>
                                    <th scope="col"><div class="slds-truncate">Source Report</div></th>
                                    <th scope="col"><div class="slds-truncate">Measure / Column</div></th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={reportSourceFields} for:item="row">
                                    <tr key={row.apiName}>
                                        <td>{row.fieldLabel}</td>
                                        <td>
                                            <a href={row.reportUrl} target="_blank" rel="noopener noreferrer">
                                                {row.reportName}
                                            </a>
                                        </td>
                                        <td>{row.measureLabel}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>

                <!-- Data Entry Fields -->
                <div class="slds-box slds-m-bottom_medium">
                    <p class="slds-text-heading_small slds-m-bottom_small">
                        Representative Commission Data Entry Fields
                    </p>
                    <template for:each={dataEntryFields} for:item="field">
                        <div key={field.apiName} class="field-block">

                            <!-- Row: checkbox + move buttons + configure chevron -->
                            <div class="field-row">
                                <div class="field-label">
                                    <lightning-input
                                        type="checkbox"
                                        label={field.displayLabel}
                                        checked={field.checked}
                                        data-api={field.apiName}
                                        onchange={handleFieldToggle}
                                    ></lightning-input>
                                </div>
                                <div class="field-actions">
                                    <lightning-button-icon
                                        icon-name="utility:up"
                                        variant="border-filled"
                                        size="x-small"
                                        alternative-text="Move Up"
                                        data-api={field.apiName}
                                        onclick={handleMoveUp}
                                    ></lightning-button-icon>
                                    <lightning-button-icon
                                        icon-name="utility:down"
                                        variant="border-filled"
                                        size="x-small"
                                        alternative-text="Move Down"
                                        data-api={field.apiName}
                                        onclick={handleMoveDown}
                                        class="slds-m-left_x-small"
                                    ></lightning-button-icon>
                                    <template if:true={field.checked}>
                                        <lightning-button-icon
                                            icon-name="utility:settings"
                                            variant="border-filled"
                                            size="x-small"
                                            alternative-text="Configure"
                                            data-api={field.apiName}
                                            onclick={handleToggleExpand}
                                            class="slds-m-left_x-small"
                                        ></lightning-button-icon>
                                    </template>
                                </div>
                            </div>

                            <!-- Expandable config panel -->
                            <template if:true={field.expanded}>
                                <div class="config-panel">
                                    <div class="slds-grid slds-wrap slds-gutters_small">

                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-combobox
                                                label="Usage Period"
                                                value={field.usagePeriod}
                                                options={usagePeriodOptions}
                                                data-api={field.apiName}
                                                onchange={handleUsagePeriodChange}
                                            ></lightning-combobox>
                                        </div>

                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-combobox
                                                label="Metric Type"
                                                placeholder="-- None --"
                                                value={field.metricType}
                                                options={metricTypeOptions}
                                                data-api={field.apiName}
                                                onchange={handleMetricTypeChange}
                                            ></lightning-combobox>
                                        </div>

                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                type="number"
                                                label="Default Value"
                                                value={field.defaultValue}
                                                step="0.0001"
                                                formatter="decimal"
                                                data-api={field.apiName}
                                                onchange={handleDefaultValueChange}
                                            ></lightning-input>
                                        </div>

                                        <div class="slds-col slds-size_1-of-2">
                                            <lightning-input
                                                type="text"
                                                label="Report Source (Report ID)"
                                                value={field.reportSource}
                                                maxlength="18"
                                                data-api={field.apiName}
                                                onchange={handleReportSourceChange}
                                            ></lightning-input>
                                        </div>

                                        <div class="slds-col slds-size_1-of-1">
                                            <lightning-input
                                                type="text"
                                                label="Report Field Label"
                                                value={field.reportFieldLabel}
                                                maxlength="50"
                                                data-api={field.apiName}
                                                onchange={handleReportFieldLabelChange}
                                            ></lightning-input>
                                        </div>

                                    </div>
                                </div>
                            </template>

                        </div>
                    </template>
                </div>

                <!-- Calculation Output Fields -->
                <div class="slds-box slds-m-bottom_medium">
                    <p class="slds-text-heading_small slds-m-bottom_small">
                        Representative Commission Calculation Fields
                    </p>
                    <p class="slds-text-body_small slds-text-color_weak slds-m-bottom_small">
                        Select which calculated results to display on the record detail page. Use the settings icon to configure Metric Type and Calculation Expression.
                    </p>
                    <template for:each={calcFields} for:item="field">
                        <div key={field.apiName} class="field-block">

                            <!-- Row: checkbox + move buttons + configure chevron -->
                            <div class="field-row">
                                <div class="field-label">
                                    <lightning-input
                                        type="checkbox"
                                        label={field.displayLabel}
                                        checked={field.checked}
                                        data-api={field.apiName}
                                        onchange={handleFieldToggle}
                                    ></lightning-input>
                                </div>
                                <div class="field-actions">
                                    <lightning-button-icon
                                        icon-name="utility:up"
                                        variant="border-filled"
                                        size="x-small"
                                        alternative-text="Move Up"
                                        data-api={field.apiName}
                                        onclick={handleMoveUp}
                                    ></lightning-button-icon>
                                    <lightning-button-icon
                                        icon-name="utility:down"
                                        variant="border-filled"
                                        size="x-small"
                                        alternative-text="Move Down"
                                        data-api={field.apiName}
                                        onclick={handleMoveDown}
                                        class="slds-m-left_x-small"
                                    ></lightning-button-icon>
                                    <template if:true={field.checked}>
                                        <lightning-button-icon
                                            icon-name="utility:settings"
                                            variant="border-filled"
                                            size="x-small"
                                            alternative-text="Configure"
                                            data-api={field.apiName}
                                            onclick={handleToggleExpand}
                                            class="slds-m-left_x-small"
                                        ></lightning-button-icon>
                                    </template>
                                </div>
                            </div>

                            <!-- Expandable config panel for calc fields -->
                            <template if:true={field.expanded}>
                                <div class="config-panel">
                                    <template if:true={field.isExpressionField}>
                                        <lightning-textarea
                                            label="Calculation Expression"
                                            value={field.calculationExpression}
                                            placeholder="e.g. {Field_A__c} * ({Field_B__c} / 100)"
                                            max-length="1000"
                                            data-api={field.apiName}
                                            onchange={handleCalculationExpressionChange}
                                        ></lightning-textarea>
                                    </template>
                                    <template if:false={field.isExpressionField}>
                                        <p class="slds-text-body_small slds-text-color_weak slds-p-around_x-small">
                                            Value is set automatically by the tier metadata lookup — no expression needed.
                                        </p>
                                    </template>
                                </div>
                            </template>

                        </div>
                    </template>
                </div>

                <div class="button-row">
                    <lightning-button
                        variant="brand"
                        label="Save Configuration"
                        onclick={handleSave}
                        disabled={isSaving}
                    ></lightning-button>
                    <lightning-button
                        variant="neutral"
                        label="Print / Export PDF"
                        icon-name="utility:print"
                        onclick={handlePrint}
                        class="slds-m-left_small"
                    ></lightning-button>
                </div>

            </template>

            <template if:true={showEmpty}>
                <p class="slds-text-color_weak">No accessible fields found on Representative Commission.</p>
            </template>

        </div>
    </lightning-card>
</template>
